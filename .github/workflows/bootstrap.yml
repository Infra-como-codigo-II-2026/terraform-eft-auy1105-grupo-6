name: Bootstrap State Backend

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Accion a ejecutar"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Check if bucket already exists
        id: check
        run: |
          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        working-directory: bootstrap
        run: terraform init

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && steps.check.outputs.exists == 'false'
        working-directory: bootstrap
        run: terraform apply -auto-approve

      - name: Skip - bucket already exists
        if: github.event.inputs.action == 'apply' && steps.check.outputs.exists == 'true'
        run: echo "El bucket ${{ vars.TF_STATE_BUCKET }} ya existe, no se crea de nuevo."

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: bootstrap
        run: terraform destroy -auto-appro